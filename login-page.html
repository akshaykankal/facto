            function DetectBrowser() {
                //alert(navigator.userAgent);
                if (navigator.userAgent.search("MSIE") >= 0 || navigator.userAgent.search(".NET CLR") >= 0) {
                    return "MSIE";
                }
                else if (navigator.userAgent.search("Edge") >= 0) {
                    return "EDGE";
                }
                else if (navigator.userAgent.search("Chrome") >= 0) {
                    return "CHROME";
                }
                else if (navigator.userAgent.search("Firefox") >= 0) {
                    return "FIREFOX";
                }
                else if (navigator.userAgent.search("Safari") >= 0 && navigator.userAgent.search("Chrome") >= 0) {
                    return "SAFARI";
                }
                else if (navigator.userAgent.search("Opera") >= 0) {
                    return "OPERA";
                }
            }

            function setCopyrightPosition() {
                var winHeight = $(document).height();
                if (winHeight) {
                    var clientHeight = document.body.clientHeight;
                    if (clientHeight) {

                        $('#footer').css('top', top + "px");

                        var CurrentBrowser = DetectBrowser();
                        if (CurrentBrowser) {
                            if (CurrentBrowser == "MSIE") {
                                $('#footer').css('top', top - 17 + "px");
                            }
                            else if (CurrentBrowser == "CHROME") {

                            }

                            }
                        }
                    }
                }
            }

      var failMessage = `The application couldn’t load correctly, possibly due to a blocked link on your network (${cdnUrl}); please contact your IT team to allow access.`;
      if (cdnUrl != "~" && cdnUrl != "~/") {

          fetch(cdnUrl, { method: 'HEAD' })
              .then(response => {
                  if (response.ok) {
                      console.log("CDN is accessible.");
                      if (onSuccess) onSuccess();
                  } else {
                      console.warn("CDN is not accessible: HTTP status", response.status);
                      alert(failMessage);
                      if (onFailure) onFailure();
                  }
              })
              .catch(error => {
                  console.warn("CDN is not accessible:", error);
                  alert(failMessage);
                  if (onFailure) onFailure();
              });
      } else {
          if (onSuccess) onSuccess();
      }
  }

            function Redirect(path, data, Method) {

                    }

                    text += '<input type="hidden" name="__RequestVerificationToken" value="' + getAntiForgeryToken() + '" />';
                    text += '</form>';
                    var form = $(text);
                    $('body').append(form);
                    form.submit();

                    // Append a unique query parameter to the URL

            var getCookie = function (cname) {
                var name = cname + "=";
                var decodedCookie = decodeURIComponent(document.cookie);
                var ca = decodedCookie.split(';');
                for (var i = 0; i < ca.length; i++) {
                    var c = ca[i];
                    while (c.charAt(0) == ' ') {
                        c = c.substring(1);
                    }
                    if (c.indexOf(name) == 0) {
                        return c.substring(name.length, c.length);
                    }
                }
                return "";
            }

<script type="text/javascript">
    function ShowMessageBox(Title, message, MessageBoxIcon, MatchHeaderColorToTheme)
    {
        var icon = "NONE";
        var iconHtml = '<span class="{0} float-left"></span>';
        $('#iconDiv').css('display', 'block');
        $('#Message').css('margin-left', '45px');

        if (MatchHeaderColorToTheme && (String)(MatchHeaderColorToTheme).toUpperCase() == "TRUE")
        {
            //$('#MessageBox_Modal_Header').css('background-color', '#16224d');
            //$('#MessageBox_btnOK').removeClass('btn-primary');
            //$('#MessageBox_btnOK').css('background-color', '#292929');
            //$('#MessageBox_btnOK').css('color', 'white');
        }

        MessageBoxIcon = (String)(MessageBoxIcon);
        if (MessageBoxIcon == "" || MessageBoxIcon == null) {
            icon = "NONE";
        }
        else {
            icon = (String)(MessageBoxIcon).toUpperCase();
        }

        if (icon == "NONE" || icon == "2") {
            iconHtml = "";
            $('#iconDiv').css('display', 'none');
            $('#Message').css('margin-left', '0px');
        }
        else if (icon == "ERROR" || icon == "0") {
            iconHtml = iconHtml.replace("{0}", "fa fa-times-circle text-danger");
        }
        else if (icon == "INFO" || icon == "1") {
            iconHtml = iconHtml.replace("{0}", "fa fa-info-circle text-dark");
        }
        else if (icon == "QUESTION" || icon == "3") {
            iconHtml = iconHtml.replace("{0}", "fa fa-question-circle text-Question");
        }
        else if (icon == "WARNING" || icon == "4") {
            iconHtml = iconHtml.replace("{0}", "fa fa-exclamation-triangle text-warning");
        }
        else if (icon == "SUCCESS" || icon == "5") {
            iconHtml = iconHtml.replace("{0}", "fa fa-check-circle text-success");
        }
        //SP:140722 added code for change title as per niraj sir suggestions.
        if (Title.includes("Invalid values") || Title.includes("Warning Message") || Title.includes("Error occured while saving the record") || Title.includes("Error")) {
            Title = "Operation cannot be performed";
        }
        $('#MessageTitle').html(Title);
        $('#iconDiv').html(iconHtml);
        $('#Message').html(message);
        $('#MessageBox').modal('show');

    function ShowPaymentMessageBox(Title, message, MessageBoxIcon, MatchHeaderColorToTheme) {
        var icon = "NONE";
        var iconHtml = '<span class="{0} float-left"></span>';
        $('#PaymenticonDiv').css('display', 'block');
        $('#PaymentMessage').css('margin-left', '45px');

        if (MatchHeaderColorToTheme && (String)(MatchHeaderColorToTheme).toUpperCase() == "TRUE") {
            
        }

        MessageBoxIcon = (String)(MessageBoxIcon);
        if (MessageBoxIcon == "" || MessageBoxIcon == null) {
            icon = "NONE";
        }
        else {
            icon = (String)(MessageBoxIcon).toUpperCase();
        }

        if (icon == "NONE" || icon == "2") {
            iconHtml = "";
            $('#PaymenticonDiv').css('display', 'none');
            $('#PaymentMessage').css('margin-left', '0px');
        }
        else if (icon == "ERROR" || icon == "0") {
            iconHtml = iconHtml.replace("{0}", "fa fa-times-circle text-danger");
        }
        else if (icon == "INFO" || icon == "1") {
            iconHtml = iconHtml.replace("{0}", "fa fa-info-circle text-dark");
        }
        else if (icon == "QUESTION" || icon == "3") {
            iconHtml = iconHtml.replace("{0}", "fa fa-question-circle text-Question");
        }
        else if (icon == "WARNING" || icon == "4") {
            iconHtml = iconHtml.replace("{0}", "fa fa-exclamation-triangle text-warning");
        }
        else if (icon == "SUCCESS" || icon == "5") {
            iconHtml = iconHtml.replace("{0}", "fa fa-check-circle text-success");
        }

        $('#PaymentMessageTitle').html(Title);
        $('#PaymenticonDiv').html(iconHtml);
        $('#PaymentMessage').html(message);
        $('#PaymentMessageBox').modal('show');
    }
